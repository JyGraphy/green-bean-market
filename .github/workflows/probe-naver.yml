# [임시] 네이버 스마트스토어 API 프로브 — 스크래퍼 작성용 1회성 확인 후 삭제
name: probe-naver

on:
  workflow_dispatch:
  push:
    branches: [claude/site-launch-improvements-xs5923]
    paths:
      - scripts/probe_naver.py
      - .github/workflows/probe-naver.yml

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright
      - run: python -m playwright install chromium --with-deps
      - run: python scripts/probe_naver.py
