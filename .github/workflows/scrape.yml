name: 생두 데이터 자동 갱신

on:
  schedule:
    # 매일 오전 6시 (KST = UTC+9, 즉 UTC 21:00 전날)
    - cron: '0 21 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 커밋 푸시 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install requests beautifulsoup4 lxml

      # 일부 스크래퍼가 실패해도(SystemExit) 정상 수집된 store는 커밋해야 하므로
      # continue-on-error로 잡고, 결과는 마지막 스텝에서 표면화한다.
      - name: 스크래퍼 실행
        id: scrape
        continue-on-error: true
        run: python scrapers/run_all.py

      # 최종 방어선: 워킹트리를 직전 커밋(HEAD)과 비교해 무결성 검증.
      # 스키마/중복ID/store 소멸/급감 중 하나라도 걸리면 실패 → 아래 커밋이 차단됨.
      - name: 데이터 무결성 검증
        id: validate
        if: always()
        continue-on-error: true
        run: python scripts/validate_data.py

      - name: 변경사항 확인
        id: check_changes
        if: always()
        run: |
          git diff --quiet data/products.json database.sql data/product_dates.json data/update_log.json data/products_web.json || echo "changed=true" >> $GITHUB_OUTPUT

      # 커밋은 '검증 통과 + 변경 있음'일 때만. 검증 실패 시 망가진 데이터가 커밋되지 않음.
      - name: 변경사항 커밋 & 푸시
        if: always() && steps.validate.outcome == 'success' && steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GreenBeanBot"
          git config user.email "bot@green-bean-market"
          git add data/products.json database.sql data/product_dates.json data/update_log.json data/products_web.json
          git commit -m "자동 갱신: $(date '+%Y-%m-%d') 생두 데이터 업데이트"
          git push

      - name: 변경 없음
        if: always() && steps.validate.outcome == 'success' && steps.check_changes.outputs.changed != 'true'
        run: echo "📦 데이터 변경 없음 — 커밋 스킵"

      # 검증 실패 → 커밋하지 않고 잡을 실패로 표시 (배포된 데이터는 그대로 유지)
      - name: 검증 실패 표면화
        if: always() && steps.validate.outcome == 'failure'
        run: |
          echo "❌ 데이터 무결성 검증 실패 — 커밋하지 않았습니다. 위 '데이터 무결성 검증' 로그를 확인하세요."
          echo "의도적 대량 변경이면 FORCE_DATA_UPDATE=1 환경변수로 수동 실행하세요."
          exit 1

      # 검증은 통과했지만 일부 스크래퍼가 실패한 경우: 정상 데이터는 커밋된 뒤 알림용 실패 표시
      - name: 스크래퍼 부분 실패 표면화
        if: always() && steps.validate.outcome == 'success' && steps.scrape.outcome == 'failure'
        run: |
          echo "⚠️ 일부 스크래퍼가 실패했습니다. 위 '스크래퍼 실행' 로그에서 실패한 사이트를 확인하세요."
          echo "실패한 사이트의 기존 데이터는 보존되었으며, 성공한 사이트는 정상 갱신·커밋되었습니다."
          exit 1
