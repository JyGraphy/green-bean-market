name: 생두 데이터 자동 갱신

on:
  schedule:
    # 매일 오전 6시 (KST = UTC+9, 즉 UTC 21:00 전날)
    - cron: '0 21 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 커밋 푸시 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 스크래퍼 실행
        run: python scrapers/run_all.py

      - name: 변경사항 확인
        id: check_changes
        run: |
          git diff --quiet data/products.json database.sql || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 변경사항 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GreenBeanBot"
          git config user.email "bot@green-bean-market"
          git add data/products.json database.sql
          git commit -m "자동 갱신: $(date '+%Y-%m-%d') 생두 데이터 업데이트"
          git push

      - name: 변경 없음
        if: steps.check_changes.outputs.changed != 'true'
        run: echo "📦 데이터 변경 없음 — 커밋 스킵"
