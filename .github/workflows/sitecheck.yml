name: 라이브 사이트 헬스체크

# 매일 갱신·배포가 끝난 뒤 실제 라이브 사이트를 자동 점검한다.
# 문제(사이트 다운/403, 상대경로·우리도메인 링크, 상품 급감, store 소멸)가 있으면
# 잡이 실패(빨간 X) → 저장소 소유자에게 알림 → 사용자가 발견하기 전에 잡는다.
on:
  schedule:
    - cron: '15 22 * * *'   # KST 07:15 (06:00 갱신·배포 이후)
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 라이브 헬스체크 (Vercel)
        run: python scripts/healthcheck.py https://green-bean-market.vercel.app

      # 진단용 원시 응답(실패 분석에 도움) — 항상 출력, 실패시키지 않음
      - name: 원시 응답 덤프 (진단)
        if: always()
        run: |
          set +e
          for url in \
            "https://green-bean-market.vercel.app" \
            "https://green-bean-market.netlify.app" ; do
            echo "=== $url ==="
            curl -sS -A "Mozilla/5.0" -L -o /dev/null \
              -w "HTTP=%{http_code} FINAL=%{url_effective}\n" --max-time 30 "$url"
          done
