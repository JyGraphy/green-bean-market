<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Green Bean Market</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-bg">
  <div class="auth-card">

    <!-- 로고 -->
    <a href="index.html" class="auth-logo">
      <span>☕</span>
      <div>
        <div class="auth-logo-title">Green Bean Market</div>
        <div class="auth-logo-sub">원두 컬렉션 관리</div>
      </div>
    </a>

    <!-- 탭 -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">로그인</button>
      <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 에러/성공 메시지 -->
    <div class="auth-msg" id="authMsg" style="display:none"></div>

    <!-- Step 1: 이메일 입력 -->
    <div id="stepEmail">
      <div class="auth-field">
        <label>이메일</label>
        <input type="email" id="emailInput" placeholder="name@example.com"
               onkeydown="if(event.key==='Enter')sendCode()">
      </div>
      <button class="auth-btn-primary" id="btnSendCode" onclick="sendCode()">
        인증코드 받기
      </button>
    </div>

    <!-- Step 2: OTP 입력 -->
    <div id="stepOtp" style="display:none">
      <div class="auth-otp-info" id="otpInfo"></div>
      <div class="auth-field">
        <label>인증코드 <span class="auth-timer" id="otpTimer"></span></label>
        <input type="text" id="otpInput" placeholder="6자리 숫자 입력"
               maxlength="8" inputmode="numeric" autocomplete="one-time-code"
               onkeydown="if(event.key==='Enter')verifyCode()">
      </div>
      <button class="auth-btn-primary" id="btnVerify" onclick="verifyCode()">
        인증 확인
      </button>
      <button class="auth-btn-ghost" onclick="backToEmail()">
        ← 이메일 다시 입력
      </button>
    </div>

    <!-- 소셜 로그인 (추후 활성화) -->
    <div class="auth-divider"><span>또는</span></div>
    <div class="auth-social">
      <button class="auth-social-btn kakao" disabled title="준비 중">
        <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_medium.png"
             alt="카카오" width="20" height="20" onerror="this.style.display='none'">
        카카오로 계속하기
        <span class="auth-soon">준비 중</span>
      </button>
      <button class="auth-social-btn naver" disabled title="준비 중">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/>
        </svg>
        네이버로 계속하기
        <span class="auth-soon">준비 중</span>
      </button>
      <button class="auth-social-btn apple" disabled title="준비 중">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Apple로 계속하기
        <span class="auth-soon">준비 중</span>
      </button>
    </div>

    <p class="auth-footer">
      <a href="index.html">← 생두 비교 사이트로 돌아가기</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="auth.js"></script>
</body>
</html>
