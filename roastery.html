<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roastery Beans — 원두 컬렉션</title>
<link rel="stylesheet" href="roastery.css">
</head>
<body>

<!-- ── 헤더 ── -->
<header class="rb-header">
  <div class="rb-header-inner">
    <div class="rb-logo">
      <span class="rb-logo-icon">☕</span>
      <div>
        <h1>Roastery Beans</h1>
        <p>로스터리 원두 정보 관리</p>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <a href="index.html" class="rb-btn-back">← 생두 비교</a>
      <button class="rb-btn-logout" id="btnLogout" title="로그아웃">로그아웃</button>
      <button class="rb-btn-add" id="btnOpenForm">+ 원두 추가</button>
    </div>
  </div>
</header>

<!-- ── 필터 바 ── -->
<div class="rb-filter-bar">
  <input class="rb-search" id="searchInput" type="text" placeholder="원두 이름, 로스터리, 원산지 검색…">
  <select class="rb-select" id="filterProcess">
    <option value="">가공방식 전체</option>
    <option>워시드</option>
    <option>내추럴</option>
    <option>허니</option>
    <option>무산소발효</option>
    <option>웻훌드</option>
    <option>펄프드내추럴</option>
    <option>기타</option>
  </select>
  <select class="rb-select" id="filterRoast">
    <option value="">로스팅 전체</option>
    <option>라이트</option>
    <option>라이트 플러스</option>
    <option>미디엄 라이트</option>
    <option>미디엄</option>
    <option>중약배전</option>
    <option>다크</option>
  </select>
  <span class="rb-count" id="beanCount">0개</span>
</div>

<!-- ── 카드 그리드 ── -->
<main class="rb-grid" id="beanGrid">
  <div class="rb-empty" id="emptyState">
    <div class="rb-empty-icon">🫘</div>
    <p>아직 등록된 원두가 없습니다</p>
    <p class="rb-empty-sub">위의 "+ 원두 추가" 버튼으로 첫 번째 원두를 등록해 보세요</p>
  </div>
</main>

<!-- ── 추가/편집 모달 ── -->
<div class="rb-overlay" id="modalOverlay">
  <div class="rb-modal" id="modal">
    <div class="rb-modal-header">
      <h2 id="modalTitle">원두 추가</h2>
      <button class="rb-modal-close" id="btnCloseModal">✕</button>
    </div>
    <form class="rb-form" id="beanForm" novalidate>
      <input type="hidden" id="fieldId">

      <div class="rb-form-row">
        <div class="rb-field rb-field-full">
          <label>원두 이름 <span class="req">*</span></label>
          <input type="text" id="fieldName" placeholder="예: 페루 훌리오 차베스 게이샤 워시드" required>
        </div>
      </div>

      <div class="rb-form-row">
        <div class="rb-field">
          <label>로스터리 <span class="req">*</span></label>
          <input type="text" id="fieldRoastery" list="roasteryList" placeholder="예: 프릳츠" required>
          <datalist id="roasteryList"></datalist>
        </div>
        <div class="rb-field">
          <label>국가</label>
          <input type="text" id="fieldCountry" list="countryList" placeholder="예: 에티오피아">
          <datalist id="countryList">
            <option>에티오피아</option><option>케냐</option><option>르완다</option>
            <option>탄자니아</option><option>우간다</option><option>부룬디</option>
            <option>브라질</option><option>콜롬비아</option><option>과테말라</option>
            <option>코스타리카</option><option>파나마</option><option>엘살바도르</option>
            <option>온두라스</option><option>멕시코</option><option>페루</option>
            <option>볼리비아</option><option>에콰도르</option><option>니카라과</option>
            <option>인도네시아</option><option>인도</option><option>베트남</option>
            <option>예멘</option><option>파푸아뉴기니</option><option>하와이</option>
          </datalist>
        </div>
      </div>

      <div class="rb-form-row">
        <div class="rb-field">
          <label>농장 / 지역</label>
          <input type="text" id="fieldFarm" placeholder="예: 쿠스코, 산 세바스티안">
        </div>
        <div class="rb-field">
          <label>고도 (masl)</label>
          <input type="number" id="fieldAltitude" placeholder="예: 1800" min="0" max="4000">
        </div>
      </div>

      <div class="rb-form-row">
        <div class="rb-field">
          <label>가공방식</label>
          <select id="fieldProcess">
            <option value="">선택</option>
            <option>워시드</option>
            <option>내추럴</option>
            <option>허니</option>
            <option>무산소발효</option>
            <option>웻훌드</option>
            <option>펄프드내추럴</option>
            <option>기타</option>
          </select>
        </div>
        <div class="rb-field">
          <label>로스팅 프로파일</label>
          <select id="fieldRoast">
            <option value="">선택</option>
            <option>라이트</option>
            <option>라이트 플러스</option>
            <option>미디엄 라이트</option>
            <option>미디엄</option>
            <option>중약배전</option>
            <option>다크</option>
          </select>
        </div>
      </div>

      <div class="rb-form-row">
        <div class="rb-field rb-field-full">
          <label>품종</label>
          <input type="text" id="fieldVariety" placeholder="예: 게이샤, SL28 (쉼표로 구분)">
        </div>
      </div>

      <div class="rb-form-row">
        <div class="rb-field rb-field-full">
          <label>컵노트</label>
          <input type="text" id="fieldNotes" placeholder="예: 자두캔디, 복숭아, 오렌지 (쉼표로 구분)">
        </div>
      </div>

      <div class="rb-form-row">
        <div class="rb-field rb-field-full">
          <label>가공 상세 / 메모</label>
          <textarea id="fieldMemo" rows="3" placeholder="예: 디펄핑 이후 약 32시간 발효를 거친 뒤 아프리칸 베드에서 약 10일간 건조"></textarea>
        </div>
      </div>

      <div class="rb-form-actions">
        <button type="button" class="rb-btn-cancel" id="btnCancel">취소</button>
        <button type="submit" class="rb-btn-save" id="btnSave">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- ── 삭제 확인 모달 ── -->
<div class="rb-overlay rb-confirm-overlay" id="confirmOverlay">
  <div class="rb-confirm">
    <p>이 원두를 삭제할까요?</p>
    <div class="rb-confirm-actions">
      <button class="rb-btn-cancel" id="btnConfirmNo">취소</button>
      <button class="rb-btn-delete" id="btnConfirmYes">삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="roastery.js"></script>
</body>
</html>
